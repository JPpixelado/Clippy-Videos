<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clippy Vídeos - Login & Cadastro</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <style>
        body { font-family: Arial, sans-serif; background: #f2f2f2; background-color: {{ user_settings.cor_fundo|default('#f2f2f2') }} !important; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: flex; gap: 40px; max-width: 600px; }
        form { display: flex; flex-direction: column; width: 250px; }
        h2 { margin-bottom: 10px; text-align: center; }
        input, button { margin-bottom: 10px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .error { color: #d32f2f; margin-bottom: 10px; font-size: 0.9em; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <form action="/login" method="POST">
            <h2>Login</h2>
            <input type="text" name="username" placeholder="Usuário" required autofocus>
            <input type="password" name="password" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>

        <form action="/cadastro" method="POST">
            <h2>Cadastro</h2>
            <input type="text" name="nome" placeholder="Nome completo" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="text" name="username" placeholder="Usuário" required>
            <input type="password" name="password" placeholder="Senha" required>
            <button type="submit">Cadastrar</button>
        </form>
    </div>
</body>
</html>
