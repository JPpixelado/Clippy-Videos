<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Erro - Clippy Vídeos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .error-container {
      max-width: 500px;
      padding: 20px;
    }
    .error-container img {
      width: 200px;
      height: auto;
      margin-bottom: 20px;
    }
    .error-message {
      font-size: 18px;
      color: #d32f2f;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .error-hint {
      font-size: 14px;
      color: #555;
    }
    a.back-link {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 18px;
      background: #1c8ef7;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: background 0.2s ease;
    }
    a.back-link:hover {
      background: #0d6efd;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <img src="{{ url_for('static', filename='icons/erro.gif') }}" alt="Erro">
    <div class="error-message">
      {{ error_message }}
    </div>
    <div class="error-hint">
      Algo deu errado. Tente novamente ou volte para a página inicial.
    </div>
    <a href="/" class="back-link">Voltar ao início</a>
  </div>
</body>
</html>
