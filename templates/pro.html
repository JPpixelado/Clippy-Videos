<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
	<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <title>Clippy PRO | Upgrade</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .pro-card {
            background: linear-gradient(145deg, #1e1e1e, #252525);
            padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center; border: 1px solid #333; max-width: 400px;
        }
        .price { font-size: 48px; font-weight: bold; color: #f1c40f; margin: 20px 0; }
        .price span { font-size: 18px; color: #aaa; }
        ul { text-align: left; margin: 30px 0; padding: 0; list-style: none; }
        li { margin-bottom: 15px; display: flex; align-items: center; }
        li::before { content: "✅"; margin-right: 10px; }
        .btn-buy {
            background: #f1c40f; color: #000; border: none; padding: 15px 30px;
            border-radius: 30px; font-weight: bold; font-size: 18px; cursor: pointer;
            transition: transform 0.2s; width: 100%;
        }
        .btn-buy:hover { transform: scale(1.05); background: #f39c12; }
        .footer-note { color: #666; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="pro-card">
    <h1>Clippy <span style="color:#f1c40f">PRO</span></h1>
    <p>Leve sua experiência para o próximo nível.</p>
    
    <div class="price">R$ 2,50 <span>/mês</span></div>

    <ul>
        <li>Download de vídeos em 1080p</li>
        <li>Selo de verificado no perfil</li>
        <li>Sem anúncios (simulação)</li>
        <li>Prioridade no suporte</li>
    </ul>

    <form action="/api/upgrade-pro" method="POST">
        <button type="submit" class="btn-buy">Assinar Agora</button>
    </form>

    <p class="footer-note">Pagamento processado de forma segura.</p>
</div>

</body>
</html>
