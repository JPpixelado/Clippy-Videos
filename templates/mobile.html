<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Clippy Mobile</title>
  <style>
    :root {
      --primary: #ff2d8d;
      --bg: {{ user_settings.cor_fundo or '#0f0f0f' }};
      --surface: #1f1f1f;
      --text: #ffffff;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      margin: 0; background: var(--bg); color: var(--text); 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding-bottom: 70px; /* Espaço para a barra inferior */
    }

    /* Header Moderno */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg); padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo { font-weight: 800; font-size: 22px; color: var(--primary); letter-spacing: -1px; }

    /* Feed de Vídeos */
    .feed { display: flex; flex-direction: column; gap: 4px; }
    
    .video-card { width: 100%; background: var(--bg); text-decoration: none; color: inherit; }
    
    .thumbnail-container { 
      position: relative; width: 100%; aspect-ratio: 16/9; 
      background: #000; overflow: hidden;
    }
    .thumbnail-container img { width: 100%; height: 100%; object-fit: cover; }
    
    .video-info { padding: 12px; display: flex; gap: 12px; }
    .channel-avatar { 
      width: 36px; height: 36px; border-radius: 50%; 
      background: var(--surface); flex-shrink: 0; 
    }
    .text-info { flex: 1; }
    .video-title { 
      font-size: 15px; font-weight: 600; line-height: 1.2; 
      margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .video-meta { font-size: 12px; color: #aaa; }

    /* Barra de Navegação Inferior */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(15, 15, 15, 0.95);
      backdrop-filter: blur(10px);
      display: flex; justify-content: space-around;
      padding: 10px 0; border-top: 1px solid rgba(255,255,255,0.1);
      z-index: 1000;
    }
    .nav-item { 
      display: flex; flex-direction: column; align-items: center; 
      text-decoration: none; color: #aaa; font-size: 10px; gap: 4px;
    }
    .nav-item.active { color: var(--text); }
    .nav-item img { width: 24px; height: 24px; filter: grayscale(1); opacity: 0.7; }
    .nav-item.active img { filter: none; opacity: 1; }

    .btn-upload-circle {
      background: var(--primary);
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-top: -5px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">CLIPPY</div>
    <a href="/lang=mobile/buscar" style="text-decoration:none">🔍</a>
  </header>

  <main class="feed">
    {% for v in videos %}
    <a href="/lang=mobile/video/{{ v.id }}" class="video-card">
      <div class="thumbnail-container">
        <img src="{{ static_url }}uploads/{{ v.thumb }}" alt="{{ v.title }}">
      </div>
      <div class="video-info">
        <div class="channel-avatar"></div>
        <div class="text-info">
          <div class="video-title">{{ v.title }}</div>
          <div class="video-meta">{{ v.views }} visualizações • {{ v.data_postagem }}</div>
        </div>
      </div>
    </a>
    {% endfor %}
  </main>

  <nav class="bottom-nav">
    <a href="/lang=mobile" class="nav-item active">
      <img src="{{ static_url }}icons/home.png"> Início
    </a>
    <a href="/shorts" class="nav-item">
      <img src="{{ static_url }}icons/shorts.png"> Shorts
    </a>
    <a href="/studio/upload" class="nav-item">
      <div class="btn-upload-circle"><span style="font-size:24px; color:white">+</span></div>
    </a>
    <a href="/playlists" class="nav-item">
      <img src="{{ static_url }}icons/playlist.png"> Playlists
    </a>
    <a href="/perfil" class="nav-item">
      <img src="{{ static_url }}icons/user.png"> Você
    </a>
  </nav>

</body>
</html>
