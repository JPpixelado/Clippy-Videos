<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gravar Short | Clippy Videos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: #000;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .top-bar {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      z-index: 1;
      font-size: 16px;
    }

    .top-bar span {
      background: rgba(0,0,0,0.6);
      padding: 6px 12px;
      border-radius: 20px;
    }

    .right-toolbar {
      position: absolute;
      right: 20px;
      top: 100px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 1;
    }

    .right-toolbar button {
      background: rgba(0,0,0,0.6);
      border: none;
      color: white;
      font-size: 18px;
      padding: 10px;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      cursor: pointer;
    }

    .bottom-bar {
      position: absolute;
      bottom: 30px;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      z-index: 1;
    }

    .bottom-bar button {
      background: red;
      border: none;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255,0,0,0.6);
    }

    .bottom-bar .icon {
      background: rgba(0,0,0,0.6);
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <video id="preview" autoplay muted playsinline></video>

  <div class="top-bar">
    <span>🎵 Adicionar áudio • ⏱️ 15s</span>
  </div>

  <div class="right-toolbar">
    <button title="Trocar câmera">🔄</button>
    <button title="Velocidade">1x</button>
    <button title="Ajuda">❔</button>
  </div>

  <div class="bottom-bar">
    <button class="icon" title="Galeria">🖼️</button>
    <button id="recordBtn" title="Gravar"></button>
    <button class="icon" title="Configurações">⚙️</button>
  </div>

  <script>
  let mediaRecorder;
  let recordedChunks = [];

  const preview = document.getElementById('preview');
  const recordBtn = document.getElementById('recordBtn');

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true })
    .then(stream => {
      preview.srcObject = stream;
      mediaRecorder = new MediaRecorder(stream);

      mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };

      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const formData = new FormData();
        // Pega a data atual
const now = new Date();
const dia = String(now.getDate()).padStart(2, '0');
const mes = String(now.getMonth() + 1).padStart(2, '0'); // mês começa em 0
const ano = now.getFullYear();

// Monta o nome do arquivo
const filename = `${dia}-${mes}-${ano}.webm`;

// Adiciona ao formData
formData.append('video', blob, filename);
        formData.append('title', 'Short gravado pelo celular');

        fetch('/upload_short', {
          method: 'POST',
          body: formData
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            alert('Short enviado com sucesso!');
          } else {
            alert('Erro ao enviar: ' + data.error);
          }
        });

        recordedChunks = [];
      };

      recordBtn.onclick = () => {
        if (mediaRecorder.state === 'inactive') {
          mediaRecorder.start();
          recordBtn.style.background = '#555';
        } else {
          mediaRecorder.stop();
          recordBtn.style.background = 'red';
        }
      };
    })
    .catch(err => alert('Erro ao acessar câmera: ' + err));
</script>
</body>
</html>
